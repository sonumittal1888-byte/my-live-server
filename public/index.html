<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Live Streaming Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;position:relative;overflow:hidden;}
        .bg-mesh{position:fixed;width:100%;height:100%;top:0;left:0;z-index:0;background:radial-gradient(ellipse at 20% 80%,rgba(56,189,248,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.15) 0%,transparent 50%),#0a0a0f;}
        .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.6;animation:orbFloat 15s infinite ease-in-out;}
        .orb-1{width:500px;height:500px;background:linear-gradient(135deg,#3b82f6,#06b6d4);top:-150px;left:-150px;}
        .orb-2{width:400px;height:400px;background:linear-gradient(135deg,#8b5cf6,#ec4899);bottom:-100px;right:-100px;animation-delay:-5s;}
        .orb-3{width:300px;height:300px;background:linear-gradient(135deg,#06b6d4,#3b82f6);top:40%;left:60%;animation-delay:-10s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-40px) scale(1.15);}66%{transform:translate(-30px,30px) scale(0.9);}}
        .glass-card{background:rgba(20,20,30,0.6);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.08);border-radius:32px;padding:48px;width:100%;max-width:460px;position:relative;z-index:1;box-shadow:0 25px 50px -12px rgba(0,0,0,0.7),0 0 100px rgba(59,130,246,0.1);overflow:hidden;}
        .logo-section{text-align:center;margin-bottom:36px;}
        .logo-wrapper{position:relative;display:inline-block;margin-bottom:20px;}
        .logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#3b82f6,#06b6d4,#8b5cf6);background-size:200% 200%;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;position:relative;z-index:1;animation:gradientShift 5s ease infinite;box-shadow:0 10px 40px rgba(59,130,246,0.4),0 0 60px rgba(59,130,246,0.2);}
        @keyframes gradientShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        .logo-icon svg{width:36px;height:36px;color:white;}
        .logo-section h1{color:white;font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .logo-section p{color:rgba(148,163,184,0.8);font-size:14px;font-weight:400;}
        .tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:16px;padding:4px;margin-bottom:32px;border:1px solid rgba(255,255,255,0.05);}
        .tab-btn{flex:1;padding:14px;border:none;background:transparent;color:rgba(148,163,184,0.6);font-size:14px;font-weight:600;cursor:pointer;border-radius:12px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);font-family:'Inter',sans-serif;position:relative;}
        .tab-btn.active{color:white;background:rgba(59,130,246,0.2);box-shadow:0 4px 20px rgba(59,130,246,0.3);}
        .form-container{display:none;}
        .form-container.active{display:block;animation:slideUp 0.5s ease-out;}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .input-group{margin-bottom:24px;}
        .input-group label{display:block;color:rgba(148,163,184,0.9);font-size:12px;font-weight:600;margin-bottom:10px;text-transform:uppercase;}
        .input-wrapper{position:relative;}
        .input-wrapper input{width:100%;padding:16px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:white;outline:none;}
        .submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,#3b82f6,#06b6d4,#8b5cf6);border:none;border-radius:16px;color:white;font-weight:700;cursor:pointer;transition:0.3s;}
        .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
        .spinner{display:none;width:20px;height:20px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .divider{display:flex;align-items:center;margin:28px 0;color:rgba(148,163,184,0.5);font-size:13px;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
        .social-login{display:flex;gap:12px;}
        .social-btn{flex:1;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
        .toast{position:fixed;top:24px;right:24px;padding:18px;background:#1e293b;border-radius:12px;color:white;transform:translateX(500px);transition:0.5s;z-index:1000;}
        .toast.show{transform:translateX(0);}
        .form-footer{text-align:center;margin-top:28px;color:rgba(148,163,184,0.6);font-size:14px;}
        .form-footer a{color:#3b82f6;text-decoration:none;font-weight:700;}
        .particles{position:fixed;width:100%;height:100%;top:0;left:0;pointer-events:none;}
        .particle{position:absolute;background:rgba(59,130,246,0.4);border-radius:50%;animation:particleFloat 20s infinite;}
    </style>
</head>
<body>
    <div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    <div class="particles" id="particles"></div>

    <div class="glass-card">
        <div class="logo-section">
            <div class="logo-wrapper"><div class="logo-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></div></div>
            <h1>StreamFlow</h1><p>Your premium live streaming platform</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="signin-form" class="form-container active">
            <form onsubmit="handleSignIn(event)">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper"><input type="email" id="signin-email" placeholder="Enter email" required></div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper"><input type="password" id="signin-password" placeholder="Enter password" required></div>
                </div>
                <button type="submit" class="submit-btn" id="signin-btn">Sign In</button>
            </form>
            <div class="divider"><span>or continue with</span></div>
            <div class="social-login">
                <button class="social-btn" onclick="socialAuth('Google')">Google</button>
                <button class="social-btn" onclick="socialAuth('Facebook')">Facebook</button>
            </div>
            <div class="form-footer">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a></div>
        </div>

        <div id="signup-form" class="form-container">
            <form onsubmit="handleSignUp(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper"><input type="text" id="signup-name" placeholder="Full Name" required></div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper"><input type="email" id="signup-email" placeholder="Email" required></div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper"><input type="password" id="signup-password" placeholder="Password" required></div>
                </div>
                <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
            </form>
            <div class="form-footer">Already have an account? <a href="#" onclick="switchTab('signin')">Sign in</a></div>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toast-message">Success!</span></div>

    <script>
        function createParticles(){
            const container=document.getElementById('particles');
            for(let i=0;i<20;i++){
                const p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.top=Math.random()*100+'%';
                p.style.width='3px'; p.style.height='3px';
                container.appendChild(p);
            }
        }
        createParticles();

        function switchTab(tab){
            const tabs=document.querySelectorAll('.tab-btn');
            const forms=document.querySelectorAll('.form-container');
            tabs.forEach(t=>t.classList.remove('active'));
            forms.forEach(f=>f.classList.remove('active'));
            if(tab==='signin'){
                tabs[0].classList.add('active');
                document.getElementById('signin-form').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        function showToast(msg, type='success'){
            const t=document.getElementById('toast');
            document.getElementById('toast-message').textContent=msg;
            t.style.borderLeft = type === 'success' ? '4px solid #06b6d4' : '4px solid #ef4444';
            t.classList.add('show');
            setTimeout(()=>t.classList.remove('show'),3000);
        }

        function socialAuth(platform){
            showToast(platform + " login logic can be added here!", "success");
        }

        function handleSignIn(event){
            event.preventDefault();
            showToast("Signed in successfully!", "success");
        }

        async function handleSignUp(event){
            event.preventDefault();
            const btn=document.getElementById('signup-btn');
            const name=document.getElementById('signup-name').value;
            const email=document.getElementById('signup-email').value;
            const password=document.getElementById('signup-password').value;

            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                const response = await fetch('https://my-live-server-1.onrender.com/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });
                const data = await response.json();
                if(response.ok){
                    showToast("Account Created!", "success");
                    setTimeout(()=>switchTab('signin'), 1500);
                } else {
                    showToast(data.message || "Error occurred", "error");
                }
            } catch (err) {
                showToast("Server not responding!", "error");
            } finally {
                btn.innerText = "Create Account";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

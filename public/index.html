<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Live Streaming Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;position:relative;overflow:hidden;}
        .bg-mesh{position:fixed;width:100%;height:100%;top:0;left:0;z-index:0;background:radial-gradient(ellipse at 20% 80%,rgba(56,189,248,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.15) 0%,transparent 50%),#0a0a0f;}
        .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.6;animation:orbFloat 15s infinite ease-in-out;}
        .orb-1{width:500px;height:500px;background:linear-gradient(135deg,#3b82f6,#06b6d4);top:-150px;left:-150px;}
        .orb-2{width:400px;height:400px;background:linear-gradient(135deg,#8b5cf6,#ec4899);bottom:-100px;right:-100px;animation-delay:-5s;}
        .orb-3{width:300px;height:300px;background:linear-gradient(135deg,#06b6d4,#3b82f6);top:40%;left:60%;animation-delay:-10s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-40px) scale(1.15);}66%{transform:translate(-30px,30px) scale(0.9);}}
        .glass-card{background:rgba(20,20,30,0.6);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.08);border-radius:32px;padding:48px;width:100%;max-width:460px;position:relative;z-index:1;box-shadow:0 25px 50px -12px rgba(0,0,0,0.7),0 0 100px rgba(59,130,246,0.1);overflow:hidden;}
        .glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),rgba(6,182,212,0.5),transparent);}
        .logo-section{text-align:center;margin-bottom:36px;}
        .logo-wrapper{position:relative;display:inline-block;margin-bottom:20px;}
        .logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#3b82f6,#06b6d4,#8b5cf6);background-size:200% 200%;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;position:relative;z-index:1;animation:gradientShift 5s ease infinite;box-shadow:0 10px 40px rgba(59,130,246,0.4),0 0 60px rgba(59,130,246,0.2);}
        @keyframes gradientShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
        .logo-icon svg{width:36px;height:36px;color:white;}
        .logo-glow{position:absolute;inset:-10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:24px;filter:blur(20px);opacity:0.4;z-index:0;animation:pulse 3s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:0.4;transform:scale(1);}50%{opacity:0.6;transform:scale(1.05);}}
        .logo-section h1{color:white;font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .logo-section p{color:rgba(148,163,184,0.8);font-size:14px;font-weight:400;}
        .tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:16px;padding:4px;margin-bottom:32px;border:1px solid rgba(255,255,255,0.05);}
        .tab-btn{flex:1;padding:14px;border:none;background:transparent;color:rgba(148,163,184,0.6);font-size:14px;font-weight:600;cursor:pointer;border-radius:12px;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);font-family:'Inter',sans-serif;position:relative;overflow:hidden;}
        .tab-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(139,92,246,0.2));opacity:0;transition:opacity 0.3s ease;border-radius:12px;}
        .tab-btn.active{color:white;box-shadow:0 4px 20px rgba(59,130,246,0.3),inset 0 1px 0 rgba(255,255,255,0.1);}
        .tab-btn.active::before{opacity:1;}
        .tab-btn:hover:not(.active){color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.03);}
        .form-container{display:none;}
        .form-container.active{display:block;animation:slideUp 0.5s cubic-bezier(0.4,0,0.2,1);}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        .input-group{margin-bottom:24px;}
        .input-group label{display:block;color:rgba(148,163,184,0.9);font-size:12px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
        .input-wrapper{position:relative;}
        .input-wrapper input{width:100%;padding:16px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:white;font-size:15px;font-family:'Inter',sans-serif;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);outline:none;}
        .input-wrapper input::placeholder{color:rgba(148,163,184,0.4);}
        .input-wrapper input:focus{border-color:rgba(59,130,246,0.5);background:rgba(255,255,255,0.05);box-shadow:0 0 0 3px rgba(59,130,246,0.1),0 0 20px rgba(59,130,246,0.1);}
        .input-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:rgba(148,163,184,0.5);transition:color 0.3s ease;}
        .input-wrapper input:focus + .input-icon{color:rgba(59,130,246,0.8);}
        .submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,#3b82f6,#06b6d4,#8b5cf6);background-size:200% 200%;border:none;border-radius:16px;color:white;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);font-family:'Inter',sans-serif;margin-top:8px;position:relative;overflow:hidden;letter-spacing:0.5px;animation:gradientShift 5s ease infinite;}
        .submit-btn:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(59,130,246,0.4),0 0 60px rgba(59,130,246,0.2);}
        .submit-btn:active{transform:translateY(0);}
        .submit-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;box-shadow:none;}
        .submit-btn .spinner{display:none;width:22px;height:22px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;}
        .submit-btn.loading .btn-text{display:none;}
        .submit-btn.loading .spinner{display:block;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .divider{display:flex;align-items:center;margin:28px 0;color:rgba(148,163,184,0.5);font-size:13px;font-weight:500;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);}
        .divider span{padding:0 16px;}
        .social-login{display:flex;gap:12px;}
        .social-btn{flex:1;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:rgba(255,255,255,0.8);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Inter',sans-serif;}
        .social-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(59,130,246,0.3);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.3);}
        .toast{position:fixed;top:24px;right:24px;padding:18px 28px;background:rgba(15,23,42,0.9);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:white;font-size:14px;font-weight:600;display:flex;align-items:center;gap:14px;transform:translateX(500px);opacity:0;transition:all 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);z-index:1000;box-shadow:0 25px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);}
        .toast.show{transform:translateX(0);opacity:1;}
        .toast.success{border-left:3px solid #06b6d4;}
        .toast.error{border-left:3px solid #ef4444;}
        .toast-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .toast.success .toast-icon{background:rgba(6,182,212,0.15);color:#06b6d4;}
        .toast.error .toast-icon{background:rgba(239,68,68,0.15);color:#ef4444;}
        .form-footer{text-align:center;margin-top:28px;color:rgba(148,163,184,0.6);font-size:14px;font-weight:500;}
        .form-footer a{color:#3b82f6;text-decoration:none;font-weight:700;transition:color 0.3s ease;}
        .form-footer a:hover{color:#60a5fa;}
        .particles{position:fixed;width:100%;height:100%;top:0;left:0;z-index:0;pointer-events:none;}
        .particle{position:absolute;width:3px;height:3px;background:rgba(59,130,246,0.4);border-radius:50%;animation:particleFloat 20s infinite;box-shadow:0 0 10px rgba(59,130,246,0.5);}
        @keyframes particleFloat{0%,100%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100vh) rotate(720deg);opacity:0;}}
        @media(max-width:480px){.glass-card{margin:20px;padding:32px;border-radius:24px;}.logo-section h1{font-size:26px;}}
    </style>
</head>
<body>
    <div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    <div class="particles" id="particles"></div>

    <div class="glass-card">
        <div class="logo-section">
            <div class="logo-wrapper"><div class="logo-glow"></div><div class="logo-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></div></div>
            <h1>StreamFlow</h1><p>Your premium live streaming platform</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- SIGN IN FORM -->
        <div id="signin-form" class="form-container active">
            <form onsubmit="handleSignIn(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="signin-email" placeholder="Enter your email" required>
                        <span class="input-icon"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signin-password" placeholder="Enter your password" required>
                        <span class="input-icon"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></span>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="signin-btn"><span class="btn-text">Sign In</span><div class="spinner"></div></button>
            </form>

            <div class="divider"><span>or continue with</span></div>

            <div class="social-login">
                <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Google</button>
                <button class="social-btn"><svg width="18" height="18" fill="#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Facebook</button>
            </div>

            <div class="form-footer">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a></div>
        </div>

        <!-- SIGN UP FORM -->
        <div id="signup-form" class="form-container">
            <form onsubmit="handleSignUp(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="signup-name" placeholder="Enter your full name" required>
                        <span class="input-icon"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                        <span class="input-icon"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                        <span class="input-icon"><svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></span>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="signup-btn"><span class="btn-text">Create Account</span><div class="spinner"></div></button>
            </form>

            <div class="divider"><span>or sign up with</span></div>

            <div class="social-login">
                <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Google</button>
                <button class="social-btn"><svg width="18" height="18" fill="#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Facebook</button>
            </div>

            <div class="form-footer">Already have an account? <a href="#" onclick="switchTab('signin')">Sign in</a></div>
        </div>
    </div>

    <div id="toast" class="toast"><div class="toast-icon"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div><span id="toast-message">Success!</span></div>

    <script>
        // Create floating particles
        function createParticles(){const container=document.getElementById('particles');for(let i=0;i<25;i++){const particle=document.createElement('div');particle.className='particle';particle.style.left=Math.random()*100+'%';particle.style.animationDelay=Math.random()*20+'s';particle.style.animationDuration=(15+Math.random()*10)+'s';particle.style.width=(2+Math.random()*3)+'px';particle.style.height=particle.style.width;container.appendChild(particle);}}
        createParticles();

        // Tab Switching
        function switchTab(tab){const tabs=document.querySelectorAll('.tab-btn');const forms=document.querySelectorAll('.form-container');tabs.forEach(t=>t.classList.remove('active'));forms.forEach(f=>f.classList.remove('active'));if(tab==='signin'){tabs[0].classList.add('active');document.getElementById('signin-form').classList.add('active');}else{tabs[1].classList.add('active');document.getElementById('signup-form').classList.add('active');}}

        // Toast Notification
        function showToast(message,type='success'){const toast=document.getElementById('toast');const toastMessage=document.getElementById('toast-message');toast.className='toast '+type;toastMessage.textContent=message;const icon=toast.querySelector('.toast-icon');if(type==='success'){icon.innerHTML='<svg width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M5 13l4 4L19 7\"></path></svg>';}else{icon.innerHTML='<svg width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M6 18L18 6M6 6l12 12\"></path></svg>';}toast.classList.add('show');setTimeout(()=>{toast.classList.remove('show');},4000);}

        // Handle Sign In
        function handleSignIn(event){event.preventDefault();const btn=document.getElementById('signin-btn');btn.classList.add('loading');btn.disabled=true;setTimeout(()=>{btn.classList.remove('loading');btn.disabled=false;showToast('Welcome back! Sign in successful.','success');},1500);}

        // Handle Sign Up - API CALL
        async function handleSignUp(event){event.preventDefault();const btn=document.getElementById('signup-btn');const name=document.getElementById('signup-name').value;const email=document.getElementById('signup-email').value;const password=document.getElementById('signup-password').value;btn.classList.add('loading');btn.disabled=true;try{const response=await fetch('https://my-live-server-1.onrender.com/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,email:email,password:password})});const data=await response.json();if(response.ok){showToast('Account created successfully! Welcome to StreamFlow.','success');document.getElementById('signup-name').value='';document.getElementById('signup-email').value='';document.getElementById('signup-password').value='';setTimeout(()=>{switchTab('signin');},2000);}else

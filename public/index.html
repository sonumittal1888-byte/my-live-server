<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Premium Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-card { background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); position: relative; }
        h1 { font-size: 28px; margin-bottom: 5px; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: rgba(148, 163, 184, 0.8); margin-bottom: 25px; font-size: 14px; }
        .input-group { margin-bottom: 15px; position: relative; text-align: left; }
        .input-group input { width: 100%; padding: 15px 20px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; color: white; outline: none; font-size: 14px; transition: 0.3s; }
        .input-group input:focus { border-color: #3b82f6; background: rgba(255, 255, 255, 0.05); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #3b82f6, #06b6d4); border: none; border-radius: 16px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .error-banner { display: none; background: #ef4444; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="error-banner" id="error-box">Server Connection Failed</div>
        <h1>StreamFlow 🚀</h1>
        <p>Sign in to continue to VIP Dashboard</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" value="raosahabmittal@gmail.com">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" value="123456">
        </div>
        
        <button class="btn" onclick="handleLogin()">Sign In</button>
    </div>

<script>
    // आपका लाइव रेंडर सर्वर URL
    const SERVER_URL = "https://my-live-server-1.onrender.com";

    // सर्वर कनेक्शन चेक करने के लिए
    async function checkServer() {
        const errorBox = document.getElementById('error-box');
        try {
            const res = await fetch(SERVER_URL + "/");
            if (res.ok) {
                errorBox.style.display = "none"; // सर्वर चालू है तो एरर हटाओ
            } else {
                showError("Server is running but returned an error");
            }
        } catch (err) {
            showError("Server Connection Failed - Please wait 1 minute for server to wake up");
        }
    }

    function showError(msg) {
        const errorBox = document.getElementById('error-box');
        errorBox.innerText = msg;
        errorBox.style.display = "block";
    }

    function handleLogin() {
        // बिना किसी रोक-टोक सीधे होम पेज पर भेजने के लिए (क्योंकि डेटाबेस फायरबेस से कनेक्टेड है)
        window.location.href = "home.html";
    }

    // पेज लोड होते ही सर्वर चेक करें
    checkServer();
</script>
</body>
</html>

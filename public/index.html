<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Sign In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); overflow: hidden; position: relative; }
        body::before { content: ''; position: absolute; width: 400px; height: 400px; background: linear-gradient(45deg, #7c3aed, #a855f7); border-radius: 50%; top: -100px; left: -100px; filter: blur(80px); opacity: 0.6; animation: float 6s ease-in-out infinite; }
        body::after { content: ''; position: absolute; width: 350px; height: 350px; background: linear-gradient(45deg, #ec4899, #8b5cf6); border-radius: 50%; bottom: -100px; right: -100px; filter: blur(80px); opacity: 0.5; animation: float 8s ease-in-out infinite reverse; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }
        .glass-card { position: relative; width: 420px; padding: 40px 35px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); z-index: 10; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 48px; color: #a855f7; margin-bottom: 10px; display: block; }
        .logo h1 { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .logo p { color: rgba(255, 255, 255, 0.6); font-size: 13px; margin-top: 5px; }
        .tabs { display: flex; margin-bottom: 30px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 5px; border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255, 255, 255, 0.5); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
        .form { display: none; animation: fadeIn 0.4s ease; }
        .form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { position: relative; margin-bottom: 22px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(168, 85, 247, 0.8); }
        .input-group input { width: 100%; padding: 14px 14px 14px 48px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; outline: none; }
        .options { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 13px; color: #fff; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #a855f7); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .divider { display: flex; align-items: center; margin: 25px 0; color: rgba(255, 255, 255, 0.4); font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .social-login { display: flex; gap: 12px; justify-content: center; }
        .social-btn { flex: 1; padding: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; cursor: pointer; }
        .footer-text { text-align: center; margin-top: 25px; color: rgba(255, 255, 255, 0.5); font-size: 13px; }
        .footer-text a { color: #a855f7; cursor: pointer; text-decoration: none; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; color: #fff; transform: translateX(150%); transition: 0.4s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: inline-block; }
    </style>
</head>
<body>

    <div id="toast" class="toast"> <span id="toast-message"></span> </div>

    <div class="glass-card">
        <div class="logo"> <i class="fas fa-water"></i> <h1>StreamFlow</h1> <p>Sign in to continue</p> </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
            <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="form-container">
            <form id="signin-form" class="form active" onsubmit="handleSignIn(event)">
                <div class="input-group"> <input type="email" id="signin-email" placeholder="Email" required> <i class="fas fa-envelope"></i> </div>
                <div class="input-group"> <input type="password" id="signin-password" placeholder="Password" required> <i class="fas fa-lock"></i> </div>
                <button type="submit" class="submit-btn" id="signin-btn">Sign In <div class="spinner"></div></button>
            </form>

            <form id="signup-form" class="form" onsubmit="handleSignUp(event)">
                <div class="input-group"> <input type="text" id="signup-name" placeholder="Full Name" required> <i class="fas fa-user"></i> </div>
                <div class="input-group"> <input type="email" id="signup-email" placeholder="Email" required> <i class="fas fa-envelope"></i> </div>
                <div class="input-group"> <input type="password" id="signup-password" placeholder="Password" required> <i class="fas fa-lock"></i> </div>
                <button type="submit" class="submit-btn" id="signup-btn">Sign Up <div class="spinner"></div></button>
            </form>
        </div>

        <div class="divider"> <span>OR</span> </div>
        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i></button>
            <button class="social-btn"><i class="fab fa-github"></i></button>
        </div>
        <div class="footer-text">
            <p id="toggle-text">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></p>
        </div>
    </div>

    <script>
        const API_URL = "https://my-live-server-1.onrender.com";

        function switchTab(tab) {
            const isSignin = tab === 'signin';
            document.getElementById('signin-form').classList.toggle('active', isSignin);
            document.getElementById('signup-form').classList.toggle('active', !isSignin);
            document.getElementById('tab-signin').classList.toggle('active', isSignin);
            document.getElementById('tab-signup').classList.toggle('active', !isSignin);
            document.getElementById('toggle-text').innerHTML = isSignin ? 
                'Don\'t have an account? <a onclick="switchTab(\'signup\')">Sign Up</a>' : 
                'Already have an account? <a onclick="switchTab(\'signin\')">Sign In</a>';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').innerText = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function handleSignUp(e) {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.classList.add('loading');
            
            const userData = {
                name: document.getElementById('signup-name').value,
                email: document.getElementById('signup-email').value,
                password: document.getElementById('signup-password').value
            };

            try {
                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast("Account Created! Login now.", "success");
                    switchTab('signin');
                } else {
                    showToast(data.message || "Error", "error");
                }
            } catch (err) {
                showToast("Server not responding", "error");
            } finally { btn.classList.remove('loading'); }
        }

        async function handleSignIn(e) {
            e.preventDefault();
            const btn = document.getElementById('signin-btn');
            btn.classList.add('loading');

            const loginData = {
                email: document.getElementById('signin-email').value,
                password: document.getElementById('signin-password').value
            };

            try {
                const res = await fetch(`${API_URL}/signin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                const data = await res.json();
                if (res.ok) {
                    showToast("Login Successful!", "success");
                    // Dynamic automatic redirect to home.html set kar diya hai:
                    setTimeout(() => {
                        window.location.href = "home.html";
                    }, 1000);
                } else {
                    showToast(data.message || "Invalid Details", "error");
                }
            } catch (err) {
                showToast("Server Connection Failed", "error");
            } finally { btn.classList.remove('loading'); }
        }
    </script>
</body>
</html>

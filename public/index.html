<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Vijay Palace</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1e293b, #0f172a); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .logo-box { background: linear-gradient(135deg, #38bdf8, #2563eb); width: 60px; height: 60px; border-radius: 15px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
        h2 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(90deg, #0ea5e9, #2563eb); color: white; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
        .signup-link { margin-top: 25px; font-size: 13px; color: #64748b; }
        .signup-link a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box">📹</div>
        <h2>StreamFlow</h2>
        <p>Premium Live Streaming</p>
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button onclick="alert('Connecting to Vijay Palace...')">Sign In</button>
        <div class="signup-link">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</body>
</html>

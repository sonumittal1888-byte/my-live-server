<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream App</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: Arial; }
        video { width: 90%; max-width: 500px; border: 2px solid #333; border-radius: 15px; background: #222; }
        .btn { margin-top: 20px; background: #ff0000; color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <button class="btn" onclick="startStream()">START CAMERA</button>

    <script>
        async function startStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                alert("Camera error: " + err.message);
            }
        }
    </script>
</body>
</html>

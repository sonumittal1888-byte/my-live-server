<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .particles { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .particle { position: absolute; width: 10px; height: 10px; background: rgba(99, 102, 241, 0.3); border-radius: 50%; animation: float 15s infinite; }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; width: 20px; height: 20px; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; width: 15px; height: 15px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 4s; width: 25px; height: 25px; }
        .particle:nth-child(4) { left: 50%; animation-delay: 1s; width: 18px; height: 18px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 3s; width: 22px; height: 22px; }
        @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; }
        .logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .logo i { font-size: 28px; color: white; }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { color: white; font-size: 28px; font-weight: 700; }
        .brand p { color: rgba(255, 255, 255, 0.6); font-size: 14px; }
        .tabs { display: flex; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 4px; margin-bottom: 30px; position: relative; }
        .tab { flex: 1; padding: 12px; text-align: center; color: rgba(255, 255, 255, 0.5); font-weight: 500; cursor: pointer; border: none; background: none; font-size: 14px; z-index: 2; }
        .tab.active { color: white; }
        .tab-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 10px; transition: 0.3s; z-index: 1; }
        .tab-slider.right { transform: translateX(100%); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.4); }
        .input-wrapper input { width: 100%; padding: 14px 16px 14px 48px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        .toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 12px; color: white; transform: translateX(400px); transition: 0.4s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="glass-card">
            <div class="brand">
                <div class="logo"><i class="fas fa-broadcast-tower"></i></div>
                <h1>StreamFlow</h1>
                <p>Live streaming reimagined</p>
            </div>

            <div class="tabs">
                <div class="tab-slider" id="tabSlider"></div>
                <button class="tab active" id="loginTabBtn" onclick="switchTab('login')">Sign In</button>
                <button class="tab" id="signupTabBtn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="loginForm">
                <div class="input-group">
                    <div class="input-wrapper"><i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email Address"></div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper"><i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password"></div>
                </div>
                <button class="btn" onclick="handleAuth('login')">Sign In</button>
            </div>

            <div id="signupForm" class="hidden">
                <div class="input-group">
                    <div class="input-wrapper"><i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email Address"></div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper"><i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Create Password"></div>
                </div>
                <button class="btn" onclick="handleAuth('signup')">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://my-live-server-1.onrender.com';

        function switchTab(type) {
            const slider = document.getElementById('tabSlider');
            if(type === 'login') {
                slider.classList.remove('right');
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
            } else {
                slider.classList.add('right');
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById(type + 'Email').value;
            const password = document.getElementById(type + 'Password').value;
            const toast = document.getElementById('toast');

            try {
                const res = await fetch(`${API_BASE_URL}/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                toast.className = `toast show ${res.ok ? 'success' : 'error'}`;
                toast.innerText = data.message || data.error;
                setTimeout(() => toast.classList.remove('show'), 3000);
            } catch (e) {
                alert("Server Connection Error!");
            }
        }
    </script>
</body>
</html>

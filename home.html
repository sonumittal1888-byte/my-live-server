<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlow - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .dashboard-card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        h1 { font-size: 28px; margin-bottom: 10px; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: rgba(148, 163, 184, 0.8); margin-bottom: 30px; }

        .stats-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .coin-value { font-size: 32px; font-weight: 800; color: #fbbf24; display: block; }
        .coin-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: rgba(148, 163, 184, 0.6); }

        .go-live-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .go-live-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>Welcome Back! 🚀</h1>
        <p>Aapka StreamFlow account active hai.</p>
        
        <div class="stats-container">
            <span class="coin-value">🪙 100</span>
            <span class="coin-label">Available Balance</span>
        </div>

        <button class="go-live-btn" onclick="alert('Starting Camera... Camera logic coming next!')">Start Live Stream</button>
    </div>

</body>
</html>
